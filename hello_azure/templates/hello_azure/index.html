{% load static %}
<!doctype html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Python and Django at Azure App Service</title>
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">
    <link rel="icon"href="{% static 'favicon.ico' %}">
</head>
<html>
   <body>
     <main>
        <div class="px-4 py-3 my-2 text-center">
            <img class="d-block mx-auto mb-4" src="{% static 'images/azure-icon.svg' %}" alt="Azure Logo" width="192" height="192"/>
            <!-- <img  src="/docs/5.1/assets/brand/bootstrap-logo.svg" alt="" width="72" height="57"> -->
            <h2 class="display-6 fw-bold text-primary">Welcome to Azure</h2>
            
            <!--06-03-2026 - Added last updated date-->
            <b>Last updated:</b> 06-03-2026<br />
            
          </div>
        <form method="post" action="hello">
            {% csrf_token %}
            <div class="col-md-6 mx-auto text-center" style="margin: 5px;">
                <label for="name" class="form-label fw-bold fs-5">Please tell me your name?</label>
                 
                 <div class="d-grid gap-2 d-sm-flex justify-content-sm-center align-items-center my-1">
                    <input type="text" class="form-control" id="name" name="name" style="max-width: 256px;">
                  </div>            
                <div class="d-grid gap-2 d-sm-flex justify-content-sm-center my-2">
                  <button type="submit" class="btn btn-primary btn-lg px-4 gap-3">Say Hello</button>
                </div>         
               
                  
            </div>
        </form>
     </main>      
   </body>
</html>
